name: CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  light:
    if: github.base_ref == 'dev'
    name: Light suite (PR to dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test --pass-with-no-tests

      - name: Run lint and format checks
        run: bun run check

  full:
    if: github.base_ref == 'main'
    name: Full matrix (PR to main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test --pass-with-no-tests

      - name: Run lint and format checks
        run: bun run check

      - name: Run core tests
        run: bun run test:core

      - name: Run codex harness tests
        run: bun run test:codex

      - name: Run opencode harness tests
        run: bun run test:opencode
